<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenRouter Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-primary: #0a0a0f;
        --bg-secondary: #12121a;
        --bg-tertiary: #1a1a25;
        --fg-primary: #e8e8ed;
        --fg-secondary: #9090a0;
        --fg-muted: #606070;
        --accent: #00d4aa;
        --accent-dim: #00d4aa33;
        --border: #2a2a3a;
        --error: #ff4d6a;
        --user-bubble: #1e3a5f;
        --assistant-bubble: #1a1a25;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg-primary);
        color: var(--fg-primary);
        min-height: 100vh;
        margin: 0;
      }

      .font-mono {
        font-family: "JetBrains Mono", monospace;
      }

      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-secondary);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--fg-muted);
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes pulse-glow {
        0%,
        100% {
          box-shadow: 0 0 0 0 var(--accent-dim);
        }
        50% {
          box-shadow: 0 0 20px 4px var(--accent-dim);
        }
      }

      @keyframes typing {
        0%,
        60%,
        100% {
          opacity: 0.3;
        }
        30% {
          opacity: 1;
        }
      }

      .animate-in {
        animation: fadeInUp 0.4s ease-out forwards;
      }
      .message-enter {
        animation: fadeInUp 0.3s ease-out forwards;
      }
      .pulse-glow {
        animation: pulse-glow 2s ease-in-out infinite;
      }

      .bg-pattern {
        background-image:
          radial-gradient(
            circle at 20% 80%,
            var(--accent-dim) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 80% 20%,
            rgba(100, 50, 200, 0.1) 0%,
            transparent 40%
          ),
          linear-gradient(
            135deg,
            var(--bg-primary) 0%,
            var(--bg-secondary) 100%
          );
      }

      .message-bubble {
        max-width: 85%;
        word-wrap: break-word;
        line-height: 1.6;
      }

      .message-bubble pre {
        background: var(--bg-primary);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px 16px;
        overflow-x: auto;
        margin: 8px 0;
        font-size: 0.875rem;
      }

      .message-bubble code {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.875em;
        background: var(--bg-primary);
        padding: 2px 6px;
        border-radius: 4px;
      }

      .message-bubble pre code {
        background: transparent;
        padding: 0;
      }

      .input-field:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-dim);
      }

      .btn-primary {
        background: var(--accent);
        color: var(--bg-primary);
        transition: all 0.2s ease;
      }

      .btn-primary:hover:not(:disabled) {
        filter: brightness(1.1);
        transform: translateY(-1px);
      }
      .btn-primary:active:not(:disabled) {
        transform: translateY(0);
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .settings-panel {
        transform: translateX(100%);
        transition: transform 0.3s ease;
      }

      .settings-panel.open {
        transform: translateX(0);
      }

      .typing-dot {
        animation: typing 1.4s infinite;
      }
      .typing-dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body class="bg-pattern">
    <!-- Header -->
    <header
      class="fixed top-0 left-0 right-0 z-40 border-b border-[--border] bg-[--bg-secondary]/90 backdrop-blur-xl"
    >
      <div
        class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between"
      >
        <div class="flex items-center gap-3">
          <div
            class="w-8 h-8 rounded-lg bg-[--accent] flex items-center justify-center"
          >
            <svg
              class="w-5 h-5 text-[--bg-primary]"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M13 10V3L4 14h7v7l9-11h-7z"
              />
            </svg>
          </div>
          <h1 class="font-mono font-bold text-lg tracking-tight">
            OpenRouter Chat
          </h1>
        </div>
        <button
          id="settingsBtn"
          class="p-2 rounded-lg hover:bg-[--bg-tertiary] transition-colors"
          aria-label="Settings"
        >
          <svg
            class="w-5 h-5 text-[--fg-secondary]"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
            />
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
            />
          </svg>
        </button>
      </div>
    </header>

    <!-- Settings Panel -->
    <div
      id="settingsOverlay"
      class="fixed inset-0 bg-black/50 z-40 hidden"
      aria-hidden="true"
    ></div>
    <aside
      id="settingsPanel"
      class="settings-panel fixed top-0 right-0 h-full w-full max-w-md z-50 bg-[--bg-secondary] border-l border-[--border] overflow-y-auto"
    >
      <div class="p-6">
        <div class="flex items-center justify-between mb-6">
          <h2 class="font-mono font-bold text-xl">Settings</h2>
          <button
            id="closeSettings"
            class="p-2 rounded-lg hover:bg-[--bg-tertiary] transition-colors"
            aria-label="Close settings"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          </button>
        </div>

        <div class="space-y-6">
          <!-- API Key -->
          <div>
            <label
              for="apiKey"
              class="block text-sm font-medium text-[--fg-secondary] mb-2"
              >API Key</label
            >
            <div class="relative">
              <input
                type="password"
                id="apiKey"
                placeholder="sk-or-..."
                class="input-field w-full px-4 py-3 bg-[--bg-tertiary] border border-[--border] rounded-lg text-[--fg-primary] placeholder-[--fg-muted] font-mono text-sm"
              />
              <button
                id="toggleKeyVisibility"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-[--fg-muted] hover:text-[--fg-secondary]"
                aria-label="Toggle visibility"
              >
                <svg
                  class="w-5 h-5"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
                  />
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"
                  />
                </svg>
              </button>
            </div>
            <p class="mt-2 text-xs text-[--fg-muted]">
              Get your key from
              <a
                href="https://openrouter.ai/keys"
                target="_blank"
                class="text-[--accent] hover:underline"
                >openrouter.ai/keys</a
              >
            </p>
          </div>

          <!-- Model Selection -->
          <div>
            <label
              for="modelSelect"
              class="block text-sm font-medium text-[--fg-secondary] mb-2"
              >Model</label
            >
            <select
              id="modelSelect"
              class="input-field w-full px-4 py-3 bg-[--bg-tertiary] border border-[--border] rounded-lg text-[--fg-primary] cursor-pointer"
            >
              <!-- Updated Model Added Here -->
              <option value="stepfun/step-3.5-flash:free" selected>
                Step 3.5 Flash (Free)
              </option>
              <option value="anthropic/claude-3.5-sonnet">
                Claude 3.5 Sonnet
              </option>
              <option value="anthropic/claude-3-opus">Claude 3 Opus</option>
              <option value="openai/gpt-4o">GPT-4o</option>
              <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
              <option value="google/gemini-pro-1.5">Gemini Pro 1.5</option>
              <option value="meta-llama/llama-3.1-70b-instruct">
                Llama 3.1 70B
              </option>
              <option value="meta-llama/llama-3.1-8b-instruct">
                Llama 3.1 8B
              </option>
              <option value="mistralai/mistral-large">Mistral Large</option>
              <option value="deepseek/deepseek-chat">DeepSeek Chat</option>
              <option value="qwen/qwen-2.5-72b-instruct">Qwen 2.5 72B</option>
            </select>
          </div>

          <!-- Custom Model -->
          <div>
            <label
              for="customModel"
              class="block text-sm font-medium text-[--fg-secondary] mb-2"
              >Custom Model ID</label
            >
            <input
              type="text"
              id="customModel"
              placeholder="provider/model-name"
              class="input-field w-full px-4 py-3 bg-[--bg-tertiary] border border-[--border] rounded-lg text-[--fg-primary] placeholder-[--fg-muted] font-mono text-sm"
            />
            <p class="mt-2 text-xs text-[--fg-muted]">
              Overrides the dropdown selection above
            </p>
          </div>

          <!-- System Prompt -->
          <div>
            <label
              for="systemPrompt"
              class="block text-sm font-medium text-[--fg-secondary] mb-2"
              >System Prompt</label
            >
            <textarea
              id="systemPrompt"
              rows="4"
              placeholder="You are a helpful assistant..."
              class="input-field w-full px-4 py-3 bg-[--bg-tertiary] border border-[--border] rounded-lg text-[--fg-primary] placeholder-[--fg-muted] text-sm resize-none"
            ></textarea>
          </div>

          <!-- Temperature -->
          <div>
            <label
              for="temperature"
              class="block text-sm font-medium text-[--fg-secondary] mb-2"
            >
              Temperature: <span id="tempValue">0.7</span>
            </label>
            <input
              type="range"
              id="temperature"
              min="0"
              max="2"
              step="0.1"
              value="0.7"
              class="w-full accent-[--accent]"
            />
          </div>

          <!-- Clear Chat -->
          <div class="pt-4 border-t border-[--border]">
            <button
              id="clearChat"
              class="w-full px-4 py-3 bg-[--bg-tertiary] border border-[--border] rounded-lg text-[--fg-secondary] hover:text-[--error] hover:border-[--error] transition-colors"
            >
              Clear Chat History
            </button>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="pt-16 pb-32 min-h-screen">
      <div id="chatContainer" class="max-w-4xl mx-auto px-4 py-6">
        <!-- Welcome State -->
        <div
          id="welcomeState"
          class="flex flex-col items-center justify-center min-h-[60vh] text-center animate-in"
        >
          <div
            class="w-16 h-16 rounded-2xl bg-[--accent]/10 border border-[--accent]/30 flex items-center justify-center mb-6"
          >
            <svg
              class="w-8 h-8 text-[--accent]"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="1.5"
                d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"
              />
            </svg>
          </div>
          <h2 class="text-2xl font-semibold mb-3">Start a conversation</h2>
          <p class="text-[--fg-secondary] max-w-sm mb-6">
            Configure your API key in settings and send a message to begin
            chatting with AI models through OpenRouter.
          </p>
          <button
            id="openSettingsWelcome"
            class="px-6 py-3 bg-[--bg-tertiary] border border-[--border] rounded-lg text-[--fg-primary] hover:border-[--accent] transition-colors flex items-center gap-2"
          >
            <svg
              class="w-4 h-4"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
              />
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
              />
            </svg>
            Open Settings
          </button>
        </div>

        <!-- Messages Container -->
        <div id="messagesContainer" class="space-y-4 hidden"></div>
      </div>
    </main>

    <!-- Input Area -->
    <footer
      class="fixed bottom-0 left-0 right-0 z-30 border-t border-[--border] bg-[--bg-secondary]/90 backdrop-blur-xl"
    >
      <div class="max-w-4xl mx-auto px-4 py-4">
        <form id="chatForm" class="flex gap-3">
          <div class="flex-1 relative">
            <textarea
              id="messageInput"
              rows="1"
              placeholder="Type your message..."
              class="input-field w-full px-4 py-3 pr-12 bg-[--bg-tertiary] border border-[--border] rounded-xl text-[--fg-primary] placeholder-[--fg-muted] resize-none max-h-40"
              style="min-height: 48px"
            ></textarea>
          </div>
          <button
            type="submit"
            id="sendBtn"
            class="btn-primary px-5 py-3 rounded-xl font-medium flex items-center gap-2"
            disabled
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"
              />
            </svg>
            <span class="hidden sm:inline">Send</span>
          </button>
        </form>
        <div
          class="mt-2 flex items-center justify-between text-xs text-[--fg-muted]"
        >
          <span id="modelIndicator" class="font-mono">No model selected</span>
          <span id="statusIndicator">Ready</span>
        </div>
      </div>
    </footer>

    <script>
      // State
      let messages = [];
      let isLoading = false;

      // DOM Elements
      const elements = {
        settingsBtn: document.getElementById("settingsBtn"),
        settingsPanel: document.getElementById("settingsPanel"),
        settingsOverlay: document.getElementById("settingsOverlay"),
        closeSettings: document.getElementById("closeSettings"),
        openSettingsWelcome: document.getElementById("openSettingsWelcome"),
        apiKey: document.getElementById("apiKey"),
        toggleKeyVisibility: document.getElementById("toggleKeyVisibility"),
        modelSelect: document.getElementById("modelSelect"),
        customModel: document.getElementById("customModel"),
        systemPrompt: document.getElementById("systemPrompt"),
        temperature: document.getElementById("temperature"),
        tempValue: document.getElementById("tempValue"),
        clearChat: document.getElementById("clearChat"),
        chatForm: document.getElementById("chatForm"),
        messageInput: document.getElementById("messageInput"),
        sendBtn: document.getElementById("sendBtn"),
        welcomeState: document.getElementById("welcomeState"),
        messagesContainer: document.getElementById("messagesContainer"),
        modelIndicator: document.getElementById("modelIndicator"),
        statusIndicator: document.getElementById("statusIndicator"),
      };

      // Initialize
      function init() {
        loadSettings();
        setupEventListeners();
        updateUI();
      }

      // Load settings from localStorage
      function loadSettings() {
        const saved = localStorage.getItem("openrouter_settings");
        if (saved) {
          const settings = JSON.parse(saved);
          elements.apiKey.value = settings.apiKey || "";
          // Only override dropdown if a saved model exists, otherwise let HTML default stand
          if (settings.model) {
            elements.modelSelect.value = settings.model;
          }
          elements.customModel.value = settings.customModel || "";
          elements.systemPrompt.value = settings.systemPrompt || "";
          elements.temperature.value = settings.temperature || 0.7;
          elements.tempValue.textContent = elements.temperature.value;
        }
      }

      // Save settings to localStorage
      function saveSettings() {
        const settings = {
          apiKey: elements.apiKey.value,
          model: elements.modelSelect.value,
          customModel: elements.customModel.value,
          systemPrompt: elements.systemPrompt.value,
          temperature: parseFloat(elements.temperature.value),
        };
        localStorage.setItem("openrouter_settings", JSON.stringify(settings));
      }

      // Setup event listeners
      function setupEventListeners() {
        // Settings panel
        elements.settingsBtn.addEventListener("click", openSettings);
        elements.openSettingsWelcome.addEventListener("click", openSettings);
        elements.closeSettings.addEventListener("click", closeSettingsPanel);
        elements.settingsOverlay.addEventListener("click", closeSettingsPanel);

        // Keyboard shortcuts
        document.addEventListener("keydown", (e) => {
          if (
            e.key === "Escape" &&
            elements.settingsPanel.classList.contains("open")
          ) {
            closeSettingsPanel();
          }
        });

        // API key visibility toggle
        elements.toggleKeyVisibility.addEventListener("click", () => {
          const type =
            elements.apiKey.type === "password" ? "text" : "password";
          elements.apiKey.type = type;
        });

        // Settings changes
        elements.apiKey.addEventListener("input", () => {
          saveSettings();
          updateUI();
        });
        elements.modelSelect.addEventListener("change", () => {
          saveSettings();
          updateUI();
        });
        elements.customModel.addEventListener("input", () => {
          saveSettings();
          updateUI();
        });
        elements.systemPrompt.addEventListener("input", saveSettings);
        elements.temperature.addEventListener("input", () => {
          elements.tempValue.textContent = elements.temperature.value;
          saveSettings();
        });

        // Clear chat
        elements.clearChat.addEventListener("click", clearChat);

        // Chat form
        elements.chatForm.addEventListener("submit", handleSubmit);

        // Auto-resize textarea
        elements.messageInput.addEventListener("input", () => {
          elements.messageInput.style.height = "auto";
          elements.messageInput.style.height =
            Math.min(elements.messageInput.scrollHeight, 160) + "px";
          updateUI();
        });

        // Enter to send (Shift+Enter for new line)
        elements.messageInput.addEventListener("keydown", (e) => {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            elements.chatForm.dispatchEvent(new Event("submit"));
          }
        });
      }

      // Open settings panel
      function openSettings() {
        elements.settingsPanel.classList.add("open");
        elements.settingsOverlay.classList.remove("hidden");
        document.body.style.overflow = "hidden";
      }

      // Close settings panel
      function closeSettingsPanel() {
        elements.settingsPanel.classList.remove("open");
        elements.settingsOverlay.classList.add("hidden");
        document.body.style.overflow = "";
      }

      // Update UI state
      function updateUI() {
        const hasKey = elements.apiKey.value.trim().length > 0;
        const hasMessage = elements.messageInput.value.trim().length > 0;
        const model = getModel();

        elements.sendBtn.disabled = !hasKey || !hasMessage || isLoading;
        elements.modelIndicator.textContent = model || "No model selected";
        elements.statusIndicator.textContent = hasKey
          ? "Ready"
          : "API key required";
      }

      // Get current model
      function getModel() {
        const custom = elements.customModel.value.trim();
        return custom || elements.modelSelect.value;
      }

      // Clear chat
      function clearChat() {
        messages = [];
        elements.messagesContainer.innerHTML = "";
        elements.messagesContainer.classList.add("hidden");
        elements.welcomeState.classList.remove("hidden");
        closeSettings();
      }

      // Handle form submit
      async function handleSubmit(e) {
        e.preventDefault();

        const content = elements.messageInput.value.trim();
        if (!content || isLoading) return;

        const apiKey = elements.apiKey.value.trim();
        if (!apiKey) {
          showError("Please enter your API key in settings");
          openSettings();
          return;
        }

        // Hide welcome, show messages
        elements.welcomeState.classList.add("hidden");
        elements.messagesContainer.classList.remove("hidden");

        // Add user message
        messages.push({ role: "user", content });
        renderMessage({ role: "user", content });

        // Clear input
        elements.messageInput.value = "";
        elements.messageInput.style.height = "auto";

        // Set loading state
        isLoading = true;
        updateUI();
        elements.statusIndicator.textContent = "Generating...";
        showTypingIndicator();

        try {
          const response = await sendToOpenRouter(apiKey);

          hideTypingIndicator();

          if (response.error) {
            showError(response.error);
            messages.pop(); // Remove failed user message
          } else {
            messages.push({ role: "assistant", content: response.content });
            renderMessage({ role: "assistant", content: response.content });
          }
        } catch (err) {
          hideTypingIndicator();
          showError(
            "Failed to connect to OpenRouter. Please check your API key and try again.",
          );
          messages.pop();
        }

        isLoading = false;
        updateUI();
        elements.statusIndicator.textContent = "Ready";
      }

      // Send request to OpenRouter
      async function sendToOpenRouter(apiKey) {
        const model = getModel();
        const systemPrompt = elements.systemPrompt.value.trim();
        const temperature = parseFloat(elements.temperature.value);

        const apiMessages = [];
        if (systemPrompt) {
          apiMessages.push({ role: "system", content: systemPrompt });
        }
        apiMessages.push(...messages);

        try {
          const res = await fetch(
            "https://openrouter.ai/api/v1/chat/completions",
            {
              method: "POST",
              headers: {
                Authorization: `Bearer ${apiKey}`,
                "Content-Type": "application/json",
                "HTTP-Referer": window.location.href,
                "X-Title": "OpenRouter Chat Client",
              },
              body: JSON.stringify({
                model,
                messages: apiMessages,
                temperature,
              }),
            },
          );

          const data = await res.json();

          if (!res.ok) {
            return {
              error:
                data.error?.message || `HTTP ${res.status}: ${res.statusText}`,
            };
          }

          const content = data.choices?.[0]?.message?.content;
          if (!content) {
            return { error: "No response content received" };
          }

          return { content };
        } catch (err) {
          return { error: err.message || "Network error" };
        }
      }

      // Render a message
      function renderMessage(msg) {
        const div = document.createElement("div");
        div.className = `flex ${msg.role === "user" ? "justify-end" : "justify-start"} message-enter`;

        const bubble = document.createElement("div");
        bubble.className = `message-bubble px-4 py-3 rounded-2xl ${
          msg.role === "user"
            ? "bg-[--user-bubble] rounded-br-md"
            : "bg-[--assistant-bubble] border border-[--border] rounded-bl-md"
        }`;

        // Format content
        const formattedContent = formatMessage(msg.content);

        if (msg.role === "assistant") {
          bubble.innerHTML = `
          <div class="flex items-start gap-3">
            <div class="w-6 h-6 rounded-md bg-[--accent]/20 flex items-center justify-center flex-shrink-0 mt-0.5">
              <svg class="w-3.5 h-3.5 text-[--accent]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
              </svg>
            </div>
            <div class="flex-1 text-[--fg-primary]">${formattedContent}</div>
          </div>
        `;
        } else {
          bubble.innerHTML = `<div class="text-[--fg-primary]">${formattedContent}</div>`;
        }

        div.appendChild(bubble);
        elements.messagesContainer.appendChild(div);

        // Scroll to bottom
        requestAnimationFrame(() => {
          div.scrollIntoView({ behavior: "smooth", block: "end" });
        });
      }

      // Format message content (basic markdown)
      function formatMessage(content) {
        return (
          content
            // Escape HTML
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            // Code blocks
            .replace(
              /```(\w*)\n([\s\S]*?)```/g,
              '<pre><code class="language-$1">$2</code></pre>',
            )
            // Inline code
            .replace(/`([^`]+)`/g, "<code>$1</code>")
            // Bold
            .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
            // Italic
            .replace(/\*([^*]+)\*/g, "<em>$1</em>")
            // Links
            .replace(
              /\[([^\]]+)\]\(([^)]+)\)/g,
              '<a href="$2" target="_blank" rel="noopener" class="text-[--accent] hover:underline">$1</a>',
            )
            // Line breaks
            .replace(/\n/g, "<br>")
        );
      }

      // Show typing indicator
      function showTypingIndicator() {
        const indicator = document.createElement("div");
        indicator.id = "typingIndicator";
        indicator.className = "flex justify-start message-enter";
        indicator.innerHTML = `
        <div class="px-4 py-3 rounded-2xl rounded-bl-md bg-[--assistant-bubble] border border-[--border]">
          <div class="flex items-center gap-3">
            <div class="w-6 h-6 rounded-md bg-[--accent]/20 flex items-center justify-center">
              <svg class="w-3.5 h-3.5 text-[--accent]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
              </svg>
            </div>
            <div class="flex gap-1">
              <span class="typing-dot w-2 h-2 bg-[--fg-muted] rounded-full"></span>
              <span class="typing-dot w-2 h-2 bg-[--fg-muted] rounded-full"></span>
              <span class="typing-dot w-2 h-2 bg-[--fg-muted] rounded-full"></span>
            </div>
          </div>
        </div>
      `;
        elements.messagesContainer.appendChild(indicator);
        indicator.scrollIntoView({ behavior: "smooth", block: "end" });
      }

      // Hide typing indicator
      function hideTypingIndicator() {
        const indicator = document.getElementById("typingIndicator");
        if (indicator) indicator.remove();
      }

      // Show error message
      function showError(message) {
        const div = document.createElement("div");
        div.className = "flex justify-center message-enter";
        div.innerHTML = `
        <div class="px-4 py-3 rounded-xl bg-[--error]/10 border border-[--error]/30 text-[--error] text-sm max-w-md text-center">
          ${message}
        </div>
      `;
        elements.messagesContainer.appendChild(div);
        div.scrollIntoView({ behavior: "smooth", block: "end" });

        // Auto-remove after 5 seconds
        setTimeout(() => {
          div.style.opacity = "0";
          div.style.transition = "opacity 0.3s";
          setTimeout(() => div.remove(), 300);
        }, 5000);
      }

      // Initialize app
      init();
    </script>
  </body>
</html>
